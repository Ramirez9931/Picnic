<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cita Romántica - Picnic</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"> <!-- Tipografía -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Pregunta inicial -->
    <div id="pregunta">
      <p>¿Quieres tener una cita romántica conmigo?</p>
      <button id="btn-si">Sí</button>
      <button id="btn-no">No</button>
    </div>

    <!-- Carta que se muestra después de hacer clic en "Sí" -->
    <div id="carta" class="hidden">
      <p>Póngase bonita como siempre mi princesa, te paso a recoger la fecha que puedas de marzo a la 1 de la tarde amor.</p>
      <button id="ver-detalles">Ver detalles</button>
    </div>

    <!-- Detalles del picnic -->
    <div id="detalles" class="hidden">
      <h3>Colores para el picnic:</h3>
      <div class="colores">
        <div class="corazon" style="background-color: #ff7b7b;" onclick="mostrarFrase('Te amo mucho 💕')"></div>
        <div class="corazon" style="background-color: #ffbbff;" onclick="mostrarFrase('Eres mi todo 😘')"></div>
        <div class="corazon" style="background-color: #ffbb00;" onclick="mostrarFrase('Me encantas 💖')"></div>
        <div class="corazon" style="background-color: #00bfff;" onclick="mostrarFrase('Eres la mejor del mundo 😍')"></div>
        <div class="corazon" style="background-color: #32cd32;" onclick="mostrarFrase('Siempre juntos 💚')"></div>
        <div class="corazon" style="background-color: #ff4500;" onclick="mostrarFrase('Mi amor por ti es infinito 💛')"></div>
        <div class="corazon" style="background-color: #000000;" onclick="mostrarFrase('Mi corazón vive y late por ti 🖤')"></div>
        <div class="corazon" style="background-color: #ffffff;" onclick="mostrarFrase('Tu amor ilumina mi vida 🤍')"></div>
        <div class="corazon" style="background-color: #c0c0c0;" onclick="mostrarFrase('Te adoro con todo mi ser 🩶')"></div>
      </div>
      <h4>Detalles del picnic:</h4>
      <p>Debemos llevar algo al menos algo de comer: Bebida, postre y snack en estos colores.</p>
    </div>

    <!-- Mensaje interactivo -->
    <div id="mensaje-interactivo" class="hidden">
      <p id="frase"></p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
